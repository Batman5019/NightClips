<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NightClips" />
  <link rel="apple-touch-icon" href="/NightClips/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/NightClips/icon-192.png" />
  <link rel="manifest" href="/NightClips/manifest.json" />
  <title>NightClips</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="auth-container">
  <img src="/NightClips/icon-192.png" alt="NightClips" class="auth-logo">
  <h1>NightClips</h1>
  <input id="usernameInput" type="text" placeholder="Username" autocomplete="username">
  <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">
  <button id="signupBtn">Create account</button>
  <button id="loginBtn">Log in</button>
  <p id="authMessage"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none;">

  <!-- HEADER -->
  <div class="dashboard-header">
    <div class="dashboard-header-brand">
      <img src="/NightClips/icon-192.png" alt="NightClips Logo" class="dashboard-logo">
      <h1>NightClips</h1>
    </div>
    <div id="headerProfile" class="header-profile" style="display:none;">
      <img id="headerAvatar" class="header-avatar" src="" alt="You">
      <span id="headerUsername" class="header-username"></span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="gallery">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="tab-label">Gallery</span>
    </button>
    <button class="tab-btn" data-tab="library">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11H5M19 6H5M19 16H5M19 21H5"/></svg>
      <span class="tab-label">Library</span>
    </button>
    <button class="tab-btn" data-tab="upload">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3m0 0l-4 4m4-4l4 4"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
      <span class="tab-label">Upload</span>
    </button>
    <button class="tab-btn" data-tab="profile">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="tab-label">Profile</span>
    </button>
    <button class="tab-btn" data-tab="badgesTab">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/></svg>
      <span class="tab-label">Badges</span>
    </button>
  </div>

  <!-- BANNER -->
  <div id="newVideosBanner" style="display:none;" class="new-banner">
    <span>New content available</span>
    <button id="reloadVideosBtn">Refresh</button>
  </div>

  <!-- GALLERY -->
  <div id="gallery" class="tab-content">
    <input type="text" id="searchInput" placeholder="Search..." class="search-bar">
    <div id="allVideos" class="video-grid"></div>
  </div>

  <!-- LIBRARY -->
  <div id="library" class="tab-content" style="display:none;">
    <div id="userVideos" class="video-grid"></div>
  </div>

  <!-- UPLOAD -->
  <div id="upload" class="tab-content" style="display:none;">
    <div class="upload-card">

      <div class="input-group">
        <label for="videoTitleInput">Title</label>
        <input type="text" id="videoTitleInput" placeholder="Give your upload a title">
      </div>

      <!-- Type toggle -->
      <div class="upload-type-toggle">
        <button id="typeVideoBtn" class="type-btn active" data-type="video">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="15" height="12" rx="2"/><path d="M17 10l5-3v10l-5-3"/></svg>
          Video
        </button>
        <button id="typeImageBtn" class="type-btn" data-type="image">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Image
        </button>
      </div>

      <!-- File chooser -->
      <input type="file" id="videoInput" accept="video/*,image/*" hidden>
      <div class="file-pick-row">
        <button id="chooseFileBtn" class="file-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l-4 4L7 10"/><path d="M12 14V3"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
          <span id="chooseFileBtnLabel">Choose Video</span>
        </button>
        <span id="fileName" class="file-name-label">No file selected</span>
      </div>

      <!-- Thumbnail (video only) -->
      <input type="file" id="thumbnailInput" accept="image/*" hidden>
      <div class="file-pick-row" id="thumbnailRow">
        <button id="chooseThumbnailBtn" class="file-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Thumbnail (optional)
        </button>
        <span id="thumbnailFileName" class="file-name-label">No thumbnail selected</span>
      </div>

      <!-- Thumbnail preview -->
      <div id="thumbPreviewWrap" style="display:none; width:100%; max-width:280px;">
        <img id="thumbPreview" style="width:100%; border-radius:9px; margin-top:2px;">
      </div>

      <!-- Upload button -->
      <button id="uploadBtn" class="upload-submit-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15V3m0 0l-4 4m4-4l4 4"/><rect x="3" y="17" width="18" height="4" rx="1"/></svg>
        Upload
      </button>

      <div id="uploadBarContainer"><div id="uploadBar"></div></div>
      <p id="uploadMessage"></p>
      <h5>large files may take a few minutes</h5>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="tab-content" style="display:none;">
    <div class="profile-card">

      <div class="profile-avatar-wrap">
        <img id="profilePicPreview" class="profile-avatar-big" src="" alt="Profile Picture" style="display:none;">
        <div id="profileAvatarPlaceholder" class="profile-avatar-placeholder">?</div>
      </div>

      <p class="profile-uid">ID: <span id="userId"></span></p>

      <div class="input-group">
        <label for="editUsernameInput">Username</label>
        <input type="text" id="editUsernameInput" placeholder="Your username">
      </div>

      <div class="input-group">
        <label>Profile Picture</label>
        <input type="file" id="profilePicInput" accept="image/*" hidden>
        <div class="file-pick-row" style="margin-top:2px;">
          <button id="chooseProfilePicBtn" class="file-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Choose Picture
          </button>
          <span id="profilePicFileName" class="file-name-label">No picture selected</span>
        </div>
      </div>

      <!-- Live preview before save -->
      <div id="newPicPreviewWrap" style="display:none;">
        <p style="color:#333; font-size:0.78em; margin:0 0 8px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;">Preview</p>
        <img id="newPicPreview" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:2px solid #1e1e1e; display:block;">
      </div>

      <button id="saveProfileBtn" class="upload-submit-btn">Save changes</button>
      <p id="profileMessage"></p>
    </div>
  </div>

  <!-- BADGES -->
  <div id="badgesTab" class="tab-content" style="display:none;">
    <h3 style="color:#333; font-size:0.8em; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; margin:0 0 16px;">Badges</h3>
    <div id="badgesList" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NightClips" />
  <link rel="apple-touch-icon" href="/NightClips/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/NightClips/icon-192.png" />
  <link rel="manifest" href="/NightClips/manifest.json" />
  <title>NightClips</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- AUTH PAGE -->
<div id="authPage" class="auth-container">
  <h1>Welcome</h1>
  <input id="usernameInput" type="text" placeholder="Username">
  <input id="passwordInput" type="password" placeholder="Password">
  <button id="signupBtn">Sign Up</button>
  <button id="loginBtn">Log In</button>
  <p id="authMessage"></p>
</div>
<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none;">
  <!-- HEADER -->
  <div class="dashboard-header">
    <img src="/NightClips/icon-192.png" alt="NightClips Logo" class="dashboard-logo">
    <h1>NightClips</h1>
  </div>
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="gallery">Gallery</button>
    <button class="tab-btn" data-tab="library">Library</button>
    <button class="tab-btn" data-tab="upload">Upload</button>
    <button class="tab-btn" data-tab="profile">Profile</button>
    <button class="tab-btn" data-tab="badgesTab">Badges</button>
  </div>
  <div id="newVideosBanner" style="display:none;" class="new-banner">
    <span>🎬 Find New Videos</span>
    <button id="reloadVideosBtn">Reload</button>
  </div>

  <!-- GALLERY -->
  <div id="gallery" class="tab-content">
    <input type="text" id="searchInput" placeholder="Search videos..." class="search-bar">
    <div id="allVideos" class="video-grid"></div>
  </div>

  <!-- LIBRARY -->
  <div id="library" class="tab-content" style="display:none;">
    <div id="userVideos" class="video-grid"></div>
  </div>

  <!-- UPLOAD -->
  <div id="upload" class="tab-content" style="display:none;">
    <div class="upload-card">
      <div class="input-group">
        <label for="videoTitleInput">Video Title</label>
        <input type="text" id="videoTitleInput" placeholder="Enter your video title">
      </div>
      <input type="file" id="videoInput" accept="video/*" hidden>
      <button id="chooseFileBtn">Choose Video</button>
      <span id="fileName">No video selected</span>
      <input type="file" id="thumbnailInput" accept="image/*" hidden>
      <button id="chooseThumbnailBtn">Choose Thumbnail</button>
      <span id="thumbnailFileName">No thumbnail selected</span>
      <button id="uploadBtn">Upload</button>
      <div id="uploadBarContainer">
        <div id="uploadBar"></div>
      </div>
      <p id="uploadMessage"></p>
      <h5>uploading might take a few minutes</h5>
    </div>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="tab-content" style="display:none;">
    <div class="profile-card">
      <p>User ID: <span id="userId"></span></p>
      <input type="text" id="editUsernameInput" placeholder="Change username">
      <input type="file" id="profilePicInput">
      <button id="saveProfileBtn">Save Profile</button>
      <p id="profileMessage"></p>
      <img id="profilePicPreview" />
    </div>
  </div>

  <!-- BADGES -->
  <div id="badgesTab" class="tab-content" style="display:none;">
    <h3>All Badges</h3>
    <div id="badgesList" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

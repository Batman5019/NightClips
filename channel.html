<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/NightClips/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/NightClips/icon-192.png" />
  <link rel="manifest" href="/NightClips/manifest.json" />
  <title>Channel · NightClips</title>
  <link rel="stylesheet" href="channel.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="top">
    <a href="/NightClips/" class="brand">
      <img src="/NightClips/icon-192.png" alt="NightClips" />
      <span>NightClips</span>
    </a>
  </nav>

  <main class="wrap">
    <section class="header">
      <div id="chanAvatar"></div>
      <div class="headerText">
        <h1 id="chanName"></h1>
        <p id="chanDesc" class="desc"></p>

        <div class="stats">
          <div class="stat">
            <span class="num" id="totalViews">0</span>
            <span class="lbl">Total views</span>
          </div>
          <div class="stat">
            <span class="num" id="uploadCount">0</span>
            <span class="lbl">Uploads</span>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Most viewed</h2>
      <div id="mostViewed" class="grid"></div>
    </section>

    <section class="section">
      <h2>Most liked</h2>
      <div id="mostLiked" class="grid"></div>
    </section>

    <section class="section">
      <h2>All uploads</h2>
      <div id="allUploads" class="grid"></div>
    </section>
  </main>

  <script src="channel.js"></script>
</body>
</html>
